name: Quality

on:
  workflow_call:

permissions:
  contents: read

jobs:
  quality:
    name: Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Get Core Dependencies
        uses: ./.github/workflows/actions/get-core-dependencies

      - name: Format Check
        run: pnpm format:check

      - name: Lint Check
        run: pnpm lint:check

      - name: Type Check
        run: pnpm typecheck

      - name: Knip
        run: pnpm knip
