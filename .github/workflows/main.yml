name: CI

on:
  merge_group:
  push:
    branches:
      - 'main'
      - 'v5'
  pull_request:
    branches:
      - '**'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  # Build runs first
  build:
    name: Build
    uses: ./.github/workflows/build.yml

  # Everything else runs in parallel after build
  quality:
    name: Quality
    needs: [build]
    uses: ./.github/workflows/quality.yml

  unit_tests:
    name: Unit Tests
    needs: [build]
    uses: ./.github/workflows/test-unit.yml

  build_tests:
    name: Build Tests
    needs: [build]
    uses: ./.github/workflows/test-build.yml

  integration_tests:
    name: Integration Tests
    needs: [build]
    uses: ./.github/workflows/test-integration.yml

  runtime_tests:
    name: Runtime Tests
    needs: [build]
    uses: ./.github/workflows/test-runtime.yml

  special_config_tests:
    name: Special Config Tests
    needs: [build]
    uses: ./.github/workflows/test-special-config.yml

  ssr_tests:
    name: SSR Tests
    needs: [build]
    uses: ./.github/workflows/test-ssr.yml

  ssr_wasm_tests:
    name: SSR WASM Tests
    needs: [build]
    uses: ./.github/workflows/test-ssr-wasm.yml

  component_starter_tests:
    name: Component Starter Smoke Test
    needs: [build]
    uses: ./.github/workflows/test-component-starter.yml
